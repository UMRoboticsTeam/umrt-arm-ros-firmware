controller_manager:
  ros__parameters:
    update_rate: 10  # Hz

    joint_state_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster

    arm_base_controller:
      type: joint_trajectory_controller/JointTrajectoryController

    gripper_controller:
      type: position_controllers/GripperActionController

arm_base_controller:
  ros__parameters:
    joints:
      - base_yaw_joint
      - base_pitch_joint
      - elbow_0_joint

    action_monitor_rate: 20.0
    allow_integration_in_goal_trajectories: true
    allow_nonzero_velocity_at_trajectory_end: true
    allow_partial_joints_goal: false
    cmd_timeout: 0.0
    open_loop_control: true

    constraints:
      base_yaw_joint:
        goal: 0.0
        trajectory: 0.0
      base_pitch_joint:
        goal: 0.0
        trajectory: 0.0
      elbow_0_joint:
        goal: 0.0
        trajectory: 0.0
      goal_time: 0.0
      stopped_velocity_tolerance: 0.01
    gains:
      base_yaw_joint:
        p: 10000.0
        i: 1.0
        d: 1000.0
      base_pitch_joint:
        p: 10000.0
        i: 1.0
        d: 1000.0
      elbow_0_joint:
        p: 10000.0
        i: 1.0
        d: 1000.0
    interpolate_from_desired_state: true
    interpolation_method: splines
    set_last_command_interface_value_as_state_on_activation: true

    command_interfaces:
      - velocity

    state_interfaces:
      - position
      - velocity
    
gains:
  ros__parameters:
    base_yaw_joint_prop: {p: 10000, i: 1, d: 1000}
    base_pitch_joint_prop: {p: 10000, i: 1, d: 1000}
    elbow_0_joint_prop: {p: 10000, i: 1, d: 1000}

gripper_controller:
  ros__parameters:
    joint: 'gripper'