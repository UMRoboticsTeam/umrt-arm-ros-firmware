controller_manager:
  ros__parameters:
    update_rate: 10  # Hz

    joint_state_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster

    arm_base_controller:
      type: joint_trajectory_controller/JointTrajectoryController

    gripper_controller:
      type: position_controllers/GripperActionController

arm_base_controller:
  ros__parameters:
    joints:
      - base_yaw_joint
      - base_pitch_joint
      - elbow_0_joint

    command_interfaces:
      - velocity
      - position

    state_interfaces:
      - position
      - velocity

    allow_partial_joints_goal: true
    open_loop_control: false
    allow_integration_in_goal_trajectories: true
    set_last_command_interface_value_as_state_on_activation: false

    constraints:
      base_yaw_joint:
        goal: 1.0
        trajectory: 1.0
      base_pitch_joint:
        goal: 1.0
        trajectory: 1.0
      elbow_0_joint:
        goal: 1.0
        trajectory: 1.0
      goal_time: 1.0
      stopped_velocity_tolerance: 0.01

gripper_controller:
  ros__parameters:
    joint: 'gripper'